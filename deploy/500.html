<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Erro interno</title>
    <link rel="icon" type="image/png" href="images/219-images-favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #fafafa;
            color: #000;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .error-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .error-code {
            font-size: 24px;
            font-weight: 300;
            padding-right: 23px;
            border-right: 1px solid rgba(0, 0, 0, 0.3);
        }

        .error-message {
            font-size: 14px;
            font-weight: 400;
            line-height: 1.4;
        }

        @media (max-width: 480px) {
            .error-code {
                font-size: 20px;
                padding-right: 18px;
            }

            .error-message {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">500</div>
        <div class="error-message">Internal server error.</div>
    </div>
</body>
</html>
